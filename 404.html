<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Sivu ei löydy – Markkinointidata</title>

  <!-- Redirect to homepage after 3 seconds -->
  <meta http-equiv="refresh" content="3; url=https://markkinointidata.fi/"/>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan: #00F5FF;
      --cyan-dim: rgba(0,245,255,0.12);
      --cyan-border: rgba(0,245,255,0.25);
      --black: #000000;
      --dark3: #111111;
      --white: #ffffff;
    }
    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      background: var(--black);
      color: var(--white);
      overflow: hidden;
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      position: relative;
    }
    /* background grid */
    .page::before {
      content: '';
      position: absolute; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black, transparent);
    }
    .content { position: relative; z-index: 1; max-width: 520px; }
    .code {
      font-size: 96px; font-weight: 900; line-height: 1;
      letter-spacing: -0.04em;
      color: var(--cyan);
      opacity: 0.15;
      margin-bottom: 8px;
    }
    h1 {
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 800; line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    p {
      font-size: 16px; font-weight: 300;
      color: #888; line-height: 1.7;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: var(--cyan); color: var(--black);
      font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      text-decoration: none; border-radius: 4px;
      box-shadow: 0 0 30px rgba(0,245,255,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      touch-action: manipulation;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(0,245,255,0.5); }
    .countdown {
      margin-top: 24px;
      font-size: 12px; font-weight: 400; color: #555;
      letter-spacing: 0.05em;
    }
    .countdown span { color: var(--cyan); }
    /* logo */
    .logo {
      position: fixed; top: 24px; left: 24px;
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--white); text-decoration: none;
      display: flex; align-items: center; gap: 10px;
      z-index: 10;
    }
    .logo-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
    }
  </style>
</head>
<body>
  <a class="logo" href="https://markkinointidata.fi/">
    <span class="logo-dot"></span>
    Markkinointidata
  </a>

  <div class="page">
    <div class="content">
      <div class="code">404</div>
      <h1>Sivua ei löydy</h1>
      <p>Etsimäsi sivu on poistettu tai siirretty.<br/>
      Sinut ohjataan automaattisesti etusivulle.</p>
      <a class="btn" href="https://markkinointidata.fi/">← Etusivulle</a>
      <p class="countdown">Ohjaus <span id="sec">3</span> sekunnin kuluttua...</p>
    </div>
  </div>

  <script>
    // Redirect immediately via JS (faster than meta refresh)
    var s = 3;
    var el = document.getElementById('sec');
    var t = setInterval(function(){
      s--;
      el.textContent = s;
      if (s <= 0) {
        clearInterval(t);
        window.location.replace('https://markkinointidata.fi/');
      }
    }, 1000);
  </script>
</body>
</html>
